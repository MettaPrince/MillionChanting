<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พระคาถาเงินล้าน (Divine Edition)</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #141416;
            --text-main: #e0e0e0;
            --text-muted: #4a4a52;
            --gold: #d4af37;
            --gold-light: #f9e596;
            --green-completed: #2ecc71;
            --danger: #e74c3c;
            --debug-neon: #ff2a5f;
            --debug-neon-light: #ff7698;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            max-width: 600px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            text-align: center;
            box-sizing: border-box;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        h1 { color: var(--gold); font-size: 36px; font-weight: 600; margin: 0 0 10px 0; }
        
        .counter-panel { margin: 30px 0; }
        .counter-value { font-size: 80px; font-weight: 300; color: var(--gold-light); display: block; line-height: 1; text-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .counter-label { font-size: 16px; color: var(--text-muted); letter-spacing: 2px; }

        .progress-wrapper { margin: 40px 0 30px 0; padding: 0 10px; }
        .progress-track { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; position: relative; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        .progress-fill {
            height: 100%; width: 0%; background: linear-gradient(90deg, #d4af37, #f9e596, #ffffff); background-size: 200% 100%;
            border-radius: 10px; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }
        .is-recording .progress-fill { animation: shimmerBar 2s infinite linear; }
        @keyframes shimmerBar { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .btn-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
        .btn { font-family: 'Prompt', sans-serif; font-size: 16px; padding: 12px 24px; border: 1px solid transparent; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; background: transparent; }
        .btn-start { background: rgba(212, 175, 55, 0.1); color: var(--gold); border-color: rgba(212, 175, 55, 0.5); }
        .btn-start:hover:not(:disabled) { background: rgba(212, 175, 55, 0.2); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .btn-reset { color: var(--text-muted); border-color: #333; }
        .btn-reset:hover { border-color: var(--text-main); color: var(--text-main); }
        
        .ux-warning { font-size: 16px; color: #666; margin-bottom: 25px; font-style: italic; }

        details { margin-top: 15px; background: rgba(0, 0, 0, 0.3); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.03); overflow: hidden; transition: all 0.3s ease; }
        summary { padding: 14px; color: var(--text-muted); font-size: 13px; cursor: pointer; user-select: none; display: flex; justify-content: center; align-items: center; gap: 8px; }
        summary::-webkit-details-marker { display: none; }
        summary:hover { color: var(--gold); background: rgba(255, 255, 255, 0.02); }

        .katha-viewport { overflow: hidden; width: 100%; position: relative; }
        .katha-slider { display: flex; width: 200%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .katha-page { width: 50%; padding: 10px 20px 20px 20px; box-sizing: border-box; text-align: left; }
        
        .line { position: relative; padding: 8px 15px; margin: 4px 0; border-radius: 8px; color: #333; font-size: 15px; transition: all 0.4s ease; }
        .line.completed { color: var(--green-completed); opacity: 0.7; }
        .line.active { color: var(--text-main); text-shadow: 0 0 8px rgba(255, 255, 255, 0.2); }

        .debug-console { background: rgba(0, 0, 0, 0.6); border-top: 1px dashed rgba(255, 42, 95, 0.3); padding: 15px; text-align: left; font-family: 'Courier New', Courier, monospace; font-size: 12px; color: #a0a0a0; }
        .debug-row { margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .debug-label { color: #555; display: inline-block; width: 100px; }
        .debug-log-container { max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.02); }
        .debug-log-entry { margin-bottom: 5px; font-size: 11px; }
        
        .trigger-highlight {
            background: rgba(255, 42, 95, 0.2); color: var(--debug-neon-light); padding: 1px 4px; border-radius: 4px; border: 1px solid var(--debug-neon); font-weight: bold;
            box-shadow: 0 0 8px rgba(255, 42, 95, 0.4);
        }
        .target-line-badge { color: #3498db; font-weight: bold; }

        .status-bar { margin-top: 25px; font-size: 15px; color: var(--text-muted); text-align: center; }
        #transcriptHistory { color: #5a5a66; font-style: italic; font-size: 13px; margin-bottom: 10px; text-align: left; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; max-height: 120px; overflow-y: auto;}
        .history-item { margin-bottom: 6px; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 6px; }
        #transcriptCurrent { color: #cccccc; font-style: normal; font-size: 16px; display: block; min-height: 30px; border-left: 3px solid var(--gold); padding-left: 10px; text-align: left;}
    </style>
</head>

<body>
    <div class="card" id="mainCard">
        <h1>พระคาถาเงินล้าน</h1>
        <h3 class="ux-warning">⚠ ระบบยังไม่รองรับการสวดเร็วเร่งรีบ</h3>
        
        <div class="counter-panel">
            <span class="counter-label">สวดแล้ว</span>
            <span class="counter-value" id="loopCount">0</span>
            <span class="counter-label">จบ</span>
        </div>

        <div class="progress-wrapper">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="btn-group">
            <button id="startBtn" class="btn btn-start">🎤 เริ่มสวดมนต์ 🗣</button>
            <button id="resetBtn" class="btn btn-reset" data-confirm="false">⟳ รีเซ็ต</button>
        </div>
        
            <details>
            <summary>❯❯❯❯ แสดงความคืบหน้าของแต่ละวรรค</summary>
            <div class="katha-viewport">
                <div class="katha-slider" id="kathaSlider">
                    <div class="katha-page" id="page1"></div>
                    <div class="katha-page" id="page2"></div>
                </div>
            </div>
        </details>

        <details>
            <summary>✔ Debug Monitor (ตรวจสอบการทำงาน)</summary>
            <div class="debug-console">
                <div class="debug-row">
                    <span class="debug-label">Active Text:</span>
                    <span id="debugActiveText" style="color:#888;">-</span>
                </div>
                <div class="debug-row">
                    <span class="debug-label">System State:</span>
                    <span style="color:#777;">Cursor: <span id="debugIndex">0</span> | Lookahead: <span id="debugLookahead">3</span></span>
                </div>
                <div class="debug-label" style="margin-top: 5px;">Trigger Logs:</div>
                <div class="debug-log-container" id="debugLog"></div>
            </div>
        </details>

        <div class="status-bar">
            <div style="margin-bottom: 10px;">เสียงที่จับได้:</div>
            <div id="transcriptHistory"></div>
            <div id="transcriptCurrent">-</div>
        </div>
    </div>

    <script>
        const kathaLines = [
            { text: "สัมปะจิตฉามิ", triggerWords: ["สัมปะจิตฉามิ", "สัมปจิตฉามิ", "สัมปะจิชฌามิ", "จิชฌามิ", "ปะจิตฉา"] },
            { text: "นาสังสิโม", triggerWords: ["สังสิโม"] },
            { text: "พรัหมา จะ มหาเทวา สัพเพยักขา ปะลายันติ", triggerWords: ["สัพเพยักขา", "ปะรายันติ", "ยันติ"] },
            { text: "พรัหมา จะ มหาเทวา อภิลาภา ภะวันตุ เม", triggerWords: ["อภิลาภา", "ภิลาภะ", "ภิลาภา", "ภะวันตุเม"] },
            { text: "มหาปุญโญ มหาลาโภ ภะวันตุ เม", triggerWords: ["ปุญโญ", "ปุนโย", "ลาโภ"] },
            { text: "มิเตพาหุหะติ", triggerWords: ["มิเต", "มีเต", "ภาหุ", "หุหะ", "หะติ", "หุหะติ", "หูหะ"] },
            { text: "พุทธะมะอะอุ นะโมพุทธายะ", triggerWords: ["พุทธะ", "มะอะอุ", "นะโม", "พุทธายะ", "ทายะ", "ท้ายะ"] },
            { text: "วิระทะโย วิระโคนายัง วิระหิงสา", triggerWords: ["ทะโย", "โคนา", "หิงสา", "หิงษา"] },
            { text: "วิระทาสี วิระทาสา วิระอิตถิโย", triggerWords: ["ทาสี", "ทาสา", "อิตถิ", "ถิโย"] },
            { text: "พุทธัสสะ มานีมามะ พุทธัสสะ สวาโหม", triggerWords: ["มานี", "มามะ", "สวา", "สะหวา", "สวาโหม", "วาโหม", "โหม"] },
            { text: "สัมปะติจฉามิ", triggerWords: ["สัมปะติ", "ปะติฉา", "ติจฉามิ"] },
            { text: "เพ็งเพ็ง พาพา หาหา ฤๅฤๅ", triggerWords: ["หา", "ฤ", "ฤๅ", "ลือ", "รือ"] }
        ];

        let currentLine = 0;
        let loopCount = 0;
        let isRecording = false;
        let mediaRecorder;
        const socket = io();
        let lastMatchIndex = 0;
        let globalAudioStream = null;
        let streamStartTime = 0;
        
        let idleTimer;
        const IDLE_TIMEOUT = 5 * 60 * 1000;
        let isRestarting = false;

        let currentSentenceMatches = [];

        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        kathaLines.forEach((l, i) => {
            const lineHtml = `<div class="line" id="line-${i}">${l.text}</div>`;
            if (i < 6) page1.innerHTML += lineHtml;
            else page2.innerHTML += lineHtml;
        });

        function updateUI(isLoopCompletion = false) {
            kathaLines.forEach((_, i) => {
                const el = document.getElementById(`line-${i}`);
                el.className = 'line';
                if (i < currentLine) el.classList.add('completed');
                else if (i === currentLine) el.classList.add('active');
            });

            const isSecondHalf = currentLine >= 6;
            document.getElementById('kathaSlider').style.transform = isSecondHalf ? 'translateX(-50%)' : 'translateX(0)';
            document.getElementById('loopCount').innerText = loopCount;

            const progressFill = document.getElementById('progressFill');
            if (isLoopCompletion) {
                progressFill.style.transition = 'width 0.3s ease-out';
                progressFill.style.width = '100%';
                setTimeout(() => {
                    progressFill.style.transition = 'none';
                    progressFill.style.width = '0%';
                    setTimeout(() => {
                        progressFill.style.transition = 'width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    }, 50);
                }, 400);
            } else {
                const percentage = (currentLine / kathaLines.length) * 100;
                progressFill.style.width = `${percentage}%`;
            }
        }
        updateUI();

        function findFirstMatch(txt, words) {
            let bestMatch = null;
            for (let i = 0; i < words.length; i++) {
                const kw = words[i];
                const idx = txt.indexOf(kw);
                if (idx !== -1) {
                    if (!bestMatch || idx < bestMatch.index) {
                        bestMatch = { keyword: kw, index: idx, length: kw.length };
                    }
                }
            }
            return bestMatch;
        }

        function pushToHistory() {
            const currentHtml = document.getElementById('transcriptCurrent').innerHTML;
            if (currentHtml && currentHtml !== '-' && currentHtml.trim() !== '') {
                const historyDiv = document.getElementById('transcriptHistory');
                historyDiv.innerHTML += `<div class="history-item">${currentHtml}</div>`;
                historyDiv.scrollTop = historyDiv.scrollHeight;
            }
        }

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            if (isRecording) {
                idleTimer = setTimeout(() => {
                    alert("⏳ ระบบหยุดการฟังอัตโนมัติ เนื่องจากตรวจไม่พบเสียงสวดมนต์เป็นเวลานาน");
                    stopChanting();
                }, IDLE_TIMEOUT);
            }
        }

        function stopChanting() {
            if (!isRecording) return;
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            if (globalAudioStream) {
                globalAudioStream.getTracks().forEach(track => track.stop());
                globalAudioStream = null;
            }
            socket.emit('stop-recognition');
            clearTimeout(idleTimer);
            
            isRecording = false;
            document.getElementById('mainCard').classList.remove('is-recording'); 
            const startBtn = document.getElementById('startBtn');
            startBtn.innerText = "🎤 เริ่มสวดมนต์ 🗣";
            startBtn.style.color = "var(--gold)";
            startBtn.style.borderColor = "rgba(212, 175, 55, 0.5)";
            startBtn.disabled = false;
            startBtn.style.opacity = "1";
            startBtn.style.cursor = "pointer";
        }

        function smartRestart() {
            if (isRestarting) return;
            isRestarting = true;
            
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            socket.emit('stop-recognition');
            document.getElementById('debugActiveText').innerText = "[Auto-restarting...]";

            // 🟢 1. ผลักเข้า History (ตอนนี้มันจะได้ข้อความที่อัปเดตสมบูรณ์แบบ 100% แล้ว)
            pushToHistory();
            
            // 🟢 2. เตะตาเคลียร์หน้าจอ "ปัจจุบัน" ทิ้งทันที ไม่ให้มีภาพซ้อน!
            document.getElementById('transcriptCurrent').innerHTML = '-';
            lastMatchIndex = 0;
            currentSentenceMatches = []; 

            setTimeout(() => {
                if (isRecording) {
                    mediaRecorder = new MediaRecorder(globalAudioStream, { mimeType: 'audio/webm' });
                    
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.target === mediaRecorder) {
                            socket.emit('audio-chunk', e.data);
                        }
                    };
                    
                    socket.emit('start-recognition');
                    mediaRecorder.start(250);
                    
                    streamStartTime = Date.now(); 
                    isRestarting = false;
                } else {
                    isRestarting = false;
                }
            }, 300); // หน่วง 300ms ให้ระบบเคลียร์ตัวเองสนิท
        }

        socket.on('speech-data', (data) => {
            if (!isRecording || isRestarting) return;
            
            // 🟢 3. โล่กันผีหลอก (Ghost Shield): ปฏิเสธข้อความจากท่อเก่าที่ส่งมาช้าภายใน 600ms แรก 
            if (Date.now() - streamStartTime < 600) return; 

            let text = data.transcript;
            if (text.trim().length > 0) resetIdleTimer();

            const cleanText = text.replace(/\s+/g, '');
            
            if (cleanText.length < lastMatchIndex - 5) {
                pushToHistory();
                lastMatchIndex = 0;
                currentSentenceMatches = []; 
            } else if (cleanText.length < lastMatchIndex) {
                lastMatchIndex = cleanText.length;
            }

            const activeText = cleanText.substring(lastMatchIndex);
            
            document.getElementById('debugActiveText').innerText = activeText.length > 0 ? activeText : "[รอรับเสียง]";
            document.getElementById('debugIndex').innerText = lastMatchIndex;

            const maxLookahead = 3; 
            
            let matchFound = false;
            let absoluteNewCurrentLine = currentLine;
            let matchObj = null;
            let matchedCheckIndex = 0;

            for (let offset = 0; offset <= maxLookahead; offset++) {
                const checkIndex = (currentLine + offset) % kathaLines.length;
                const line = kathaLines[checkIndex];
                const match = findFirstMatch(activeText, line.triggerWords);

                if (match) {
                    matchFound = true;
                    matchObj = match;
                    matchedCheckIndex = checkIndex;
                    absoluteNewCurrentLine = currentLine + offset + 1;
                    break;
                }
            }

            let loopsAdded = 0;
            if (matchFound) {
                const keyword = matchObj.keyword;
                const targetLineText = kathaLines[matchedCheckIndex].text;
                
                currentSentenceMatches.push(keyword);
                
                const timeStr = new Date().toLocaleTimeString('th-TH');
                const logEntry = `
                    <div class="debug-log-entry">
                        [${timeStr}] จับคำว่า <span class="trigger-highlight">${keyword}</span> ➔ <span class="target-line-badge">[วรรค ${matchedCheckIndex + 1}]</span>
                    </div>`;
                const debugLog = document.getElementById('debugLog');
                debugLog.innerHTML = logEntry + debugLog.innerHTML;

                lastMatchIndex += matchObj.index + matchObj.length;
                
                loopsAdded = Math.floor(absoluteNewCurrentLine / kathaLines.length);
                loopCount += loopsAdded;
                currentLine = absoluteNewCurrentLine % kathaLines.length;
                
                updateUI(loopsAdded > 0);
            }

            // 🟢 4. สลับลำดับการทำงาน: บังคับให้ Render หน้าจอ DOM ให้เสร็จสมบูรณ์ "ก่อน" จะเรียก Restart
            let displayTranscript = text;
            currentSentenceMatches.forEach(kw => {
                const regex = new RegExp(kw, 'g');
                displayTranscript = displayTranscript.replace(regex, `<span class="trigger-highlight">${kw}</span>`);
            });
            document.getElementById('transcriptCurrent').innerHTML = displayTranscript;

            // 🟢 5. ถ้าระบบนับรอบว่าจบแล้ว ค่อยเรียก Restart ตรงนี้ (ทำให้ pushToHistory ได้คำสุดท้ายไปด้วย)
            if (loopsAdded > 0) {
                smartRestart();
            }
        });

        async function startChanting() {
            try {
                globalAudioStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: false, autoGainControl: false, noiseSuppression: false }
                });
                
                mediaRecorder = new MediaRecorder(globalAudioStream, { mimeType: 'audio/webm' });

                socket.emit('start-recognition');
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.target === mediaRecorder) {
                        socket.emit('audio-chunk', e.data);
                    }
                };
                
                mediaRecorder.start(250);

                isRecording = true;
                streamStartTime = Date.now();
                document.getElementById('mainCard').classList.add('is-recording');
                
                const startBtn = document.getElementById('startBtn');
                startBtn.innerText = "🛑 หยุดสวด";
                startBtn.style.color = "#e74c3c";
                startBtn.style.borderColor = "rgba(231, 76, 60, 0.3)";
                startBtn.disabled = false;
                startBtn.style.opacity = "1";
                startBtn.style.cursor = "pointer";

                resetIdleTimer();
            } catch (error) {
                console.error("เกิดข้อผิดพลาดในการเปิดไมค์:", error);
                alert("ไม่สามารถเข้าถึงไมโครโฟนได้ กรุณาตรวจสอบสิทธิ์การใช้งาน");
                const startBtn = document.getElementById('startBtn');
                startBtn.innerText = "🎤 เริ่มสวดมนต์ 🗣";
                startBtn.disabled = false;
                startBtn.style.opacity = "1";
                startBtn.style.cursor = "pointer";
            }
        }

        document.getElementById('startBtn').onclick = async function() {
            if (!isRecording) {
                this.innerText = "⏳ กำลังเชื่อมต่อ...";
                this.disabled = true;
                this.style.opacity = "0.7";
                this.style.cursor = "not-allowed";

                lastMatchIndex = 0;
                currentSentenceMatches = [];
                document.getElementById('transcriptCurrent').innerHTML = '-';
                document.getElementById('transcriptHistory').innerHTML = '';
                
                document.getElementById('debugLog').innerHTML = '';
                document.getElementById('debugActiveText').innerText = '-';
                
                await startChanting();
            } else {
                stopChanting();
            }
        };

        let resetTimeout;
        document.getElementById('resetBtn').onclick = function () {
            const btn = this;
            if (btn.dataset.confirm === "false") {
                btn.dataset.confirm = "true";
                btn.innerText = "⚠️ ยืนยันรีเซ็ต?";
                btn.style.color = "var(--danger)";
                btn.style.borderColor = "rgba(231, 76, 60, 0.5)";

                resetTimeout = setTimeout(() => {
                    btn.dataset.confirm = "false";
                    btn.innerText = "⟳ รีเซ็ต";
                    btn.style.color = "";
                    btn.style.borderColor = "";
                }, 3000);
            } else {
                clearTimeout(resetTimeout);
                loopCount = 0;
                currentLine = 0;
                lastMatchIndex = 0;
                currentSentenceMatches = [];
                updateUI();
                
                document.getElementById('transcriptCurrent').innerText = '-';
                document.getElementById('transcriptHistory').innerHTML = '';
                document.getElementById('debugLog').innerHTML = '';
                
                btn.dataset.confirm = "false";
                btn.innerText = "⟳ รีเซ็ต";
                btn.style.color = "";
                btn.style.borderColor = "";
            }
        };
    </script>
</body>
</html>
