# Render.com blueprint for the chanting-app.
# `npm install` triggers the postinstall hook (scripts/fetch-model.js), which
# downloads the ~147MB int8 encoder from this repo's public models-v1 release
# (no auth needed — the repo and release are public).
services:
  - type: web
    name: chanting-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # NODE_OPTIONS is picked up by any `node` invocation regardless of the
      # exact start command string - more robust than relying on
      # package.json's "start" script's --expose-gc flag alone, since a
      # manually-configured Start Command in the Render dashboard overrides
      # package.json and silently drops that flag (this happened once
      # already - server logs showed "global.gc() not available").
      - key: NODE_OPTIONS
        value: --expose-gc
    # server.js already defaults to model/bpe_vocab.txt; the Windows-only
    # BPE_VOCAB_PATH override must NOT be set here.
