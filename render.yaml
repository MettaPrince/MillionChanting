# Render.com blueprint for the chanting-app.
# `npm install` triggers the postinstall hook (scripts/fetch-model.js), which
# downloads the ~147MB int8 encoder from this repo's public models-v1 release
# (no auth needed — the repo and release are public).
services:
  - type: web
    name: chanting-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    # server.js already defaults to model/bpe_vocab.txt; the Windows-only
    # BPE_VOCAB_PATH override must NOT be set here.
